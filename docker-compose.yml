version: '3.9'

services:

  cv-service:
    build: ./services/cv-service
    ports:
      - "8000:8000"
    volumes:
      - ./services/cv-service:/app
    environment:
      - PYTHONUNBUFFERED=1

  solver-service:
    build: ./services/solver-service
    ports:
      - "8080:8080"
    volumes:
      - ./services/solver-service:/app